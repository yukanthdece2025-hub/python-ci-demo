name: PR Auto Review Summary
on:
  pull_request:
    types: [opened, synchronize, reopened]
permissions:
  pull-requests: write
  contents: read
  issues: write
jobs:
  review-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch base branch
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
      - name: Generate Summary
        id: summary
        run: |
          BASE="origin/${{ github.event.pull_request.base.ref }}"
          HEAD="${{ github.sha }}"
          FILES_CHANGED=$(git diff --name-only $BASE $HEAD | wc -l)
          ADDED=$(git diff --numstat $BASE $HEAD | awk '{sum+=$1} END {print sum+0}')
          REMOVED=$(git diff --numstat $BASE $HEAD | awk '{sum+=$2} END {print sum+0}')
          echo "FILES_CHANGED=$FILES_CHANGED" >> $GITHUB_ENV
          echo "ADDED=$ADDED" >> $GITHUB_ENV
          echo "REMOVED=$REMOVED" >> $GITHUB_ENV
          echo "Searching TODO/FIXME..."
          TODOS=""
          for file in $(git diff --name-only $BASE $HEAD)
          do
            if [ -f "$file" ]; then
              FOUND=$(grep -nE "TODO|FIXME" "$file" || true)
              if [ ! -z "$FOUND" ]; then
                TODOS="$TODOS\n$file\n$FOUND\n"
              fi
            fi
          done

          {
            echo "TODOS<<EOF"
            echo -e "$TODOS"
            echo "EOF"
          } >> $GITHUB_ENV

          {
            echo "DIFFSTAT<<EOF"
            git diff --stat $BASE $HEAD
            echo "EOF"
          } >> $GITHUB_ENV
      - name: Create Comment Body
        run: |
          cat > comment.md << EOF
          - Files Changed: $FILES_CHANGED
          - Lines Added: $ADDED
          - Lines Removed: $REMOVED
          \`\`\`
          $TODOS
          \`\`\`
          \`\`\`
          $DIFFSTAT
          \`\`\`

          ---
          Auto-generated by GitHub Actions
          EOF
      - name: Find Existing Comment
        id: find_comment
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: 'Automated Code Review Summary'
      - name: Create Comment
        if: steps.find_comment.outputs.comment-id == ''
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-path: comment.md
      - name: Update Comment
        if: steps.find_comment.outputs.comment-id != ''
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find_comment.outputs.comment-id }}
          body-path: comment.md
          edit-mode: replace
